[[package]]
name = "use-astronomy"
release = true
version_group = "rustuse-astronomy"
changelog_update = true
changelog_path = "./CHANGELOG.md"
changelog_include = [
  "use-celestial-body",
  "use-star",
  "use-planet",
  "use-moon",
  "use-astronomical-orbit",
  "use-orbital-element",
  "use-astronomical-coordinate",
  "use-magnitude",
  "use-epoch",
  "use-constellation",
  "use-astronomical-observation",
  "use-catalog-object",
]

[changelog]
header = """# Changelog

## Unreleased
"""
protect_breaking_commits = true
sort_commits = "oldest"
commit_parsers = [
  { message = "^feat(?:\\([^)]+\\))?!?: .+", group = "Added" },
  { message = "^fix(?:\\([^)]+\\))?!?: .+", group = "Fixed" },
  { message = "^security(?:\\([^)]+\\))?!?: .+", group = "Security" },
  { message = "^(?:refactor|perf|change)(?:\\([^)]+\\))?!?: .+", group = "Changed" },
  { message = "^docs(?:\\([^)]+\\))?!?: .+", group = "Documentation" },
  { message = "^(?:build|ci|chore|deps|test)(?:\\([^)]+\\))?!?: .+", group = "Tooling" },
  { footer = "^changelog: ?ignore$", skip = true },
  { message = "^.*", group = "Changed" },
]
